<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eugene Kim</title>
  <meta name="description" content="Eugene Kim">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #030b1a;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    canvas { display: block; }

    .contact {
      position: fixed;
      bottom: 2.5rem;
      left: 0;
      right: 0;
      text-align: center;
      color: rgba(170, 210, 230, 0.55);
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      font-weight: 300;
      z-index: 10;
      pointer-events: none;
    }

    .contact a {
      color: inherit;
      text-decoration: none;
      pointer-events: auto;
      transition: color 0.4s ease;
    }

    .contact a:hover {
      color: rgba(200, 235, 255, 0.9);
    }
  </style>
</head>
<body>
  <div class="contact"><a href="mailto:contact@eugenekim.ca">contact@eugenekim.ca</a></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    (() => {
      /*
       * Fish Schooling Simulation
       *
       * Based on Reynolds' boids model, parameterized from empirical fish
       * schooling research (Herbert-Read et al., Couzin et al.):
       *
       *  - ~310° visual field (~50° rear blind spot)
       *  - Separation highest priority (hard repulsion at <1 BL)
       *  - Cohesion > Alignment (polarization emerges from geometry
       *    of attraction/repulsion, not explicit heading-copying)
       *  - Semi-planar "ladder formation" — vertical stagger of 1–2 BL
       *  - Oblong/ellipsoidal school shape elongated along travel direction
       *  - Speed regulation as primary interaction mechanism
       */

      /* ── Configuration ── */
      const FISH_COUNT = 500;
      const BOUNDS = 40;
      const MAX_SPEED = 0.35;
      const MIN_SPEED = 0.10;
      const CRUISE_SPEED = 0.22;

      /* Neighbor radii (in body-length units, 1 BL ≈ 1.8 scene units) */
      const SEPARATION_DIST = 1.6;   /* 0.5–1.0 BL — hard repulsion zone */
      const ALIGNMENT_DIST = 4.5;    /* 1.0–3.0 BL — medium range */
      const COHESION_DIST = 7.2;     /* 2.0–4.0 BL — longest range */

      /*
       * Force weights — research-backed hierarchy for fish:
       * Separation (1.0) >> Cohesion (0.5–0.8) > Alignment (0.3–0.6)
       * Alignment is weak because polarization emerges from
       * the interplay of attraction and repulsion geometry.
       */
      const SEPARATION_FORCE = 0.06;
      const ALIGNMENT_FORCE = 0.025;
      const COHESION_FORCE = 0.04;
      const WANDER_FORCE = 0.003;
      const BOUNDARY_FORCE = 0.05;

      /* Speed regulation — fish slow down near neighbors, speed up to rejoin */
      const SPEED_REGULATION = 0.015;

      /* Visual field: fish see ~310°, blind spot directly behind (~50°) */
      const BLIND_SPOT_COS = Math.cos(Math.PI * (310 / 360)); /* cos(155°) ≈ -0.906 */

      /* ── Scene ── */
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 250);
      camera.position.set(0, 0, 55);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      /* ── Ocean gradient background ── */
      const bgCanvas = document.createElement('canvas');
      bgCanvas.width = 2;
      bgCanvas.height = 512;
      const bgCtx = bgCanvas.getContext('2d');
      const grad = bgCtx.createLinearGradient(0, 0, 0, 512);
      grad.addColorStop(0.0,  '#0a3d5c');  /* lighter teal near surface */
      grad.addColorStop(0.15, '#0c3252');
      grad.addColorStop(0.35, '#092945');
      grad.addColorStop(0.55, '#061e35');
      grad.addColorStop(0.75, '#041428');
      grad.addColorStop(1.0,  '#020a18');  /* deep dark navy at depth */
      bgCtx.fillStyle = grad;
      bgCtx.fillRect(0, 0, 2, 512);
      const bgTexture = new THREE.CanvasTexture(bgCanvas);
      scene.background = bgTexture;

      /* ── Underwater fog ── */
      scene.fog = new THREE.FogExp2(0x051a2e, 0.012);

      /* ── Caustic light plane (projected onto a large plane above the scene) ── */
      const causticCanvas = document.createElement('canvas');
      causticCanvas.width = 256;
      causticCanvas.height = 256;
      const causticCtx = causticCanvas.getContext('2d');
      const causticTexture = new THREE.CanvasTexture(causticCanvas);
      causticTexture.wrapS = causticTexture.wrapT = THREE.RepeatWrapping;

      const causticMat = new THREE.MeshBasicMaterial({
        map: causticTexture,
        transparent: true,
        opacity: 0.07,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
      });
      const causticPlane = new THREE.Mesh(
        new THREE.PlaneGeometry(120, 120),
        causticMat
      );
      causticPlane.position.set(0, 28, 0);
      causticPlane.rotation.x = -Math.PI / 2;
      scene.add(causticPlane);

      function updateCaustics(time) {
        causticCtx.clearRect(0, 0, 256, 256);
        const t = time * 0.0003;
        for (let i = 0; i < 18; i++) {
          const x = 128 + Math.sin(t + i * 1.7) * 80 + Math.cos(t * 0.7 + i * 2.3) * 40;
          const y = 128 + Math.cos(t * 0.8 + i * 1.3) * 80 + Math.sin(t * 0.5 + i * 1.9) * 40;
          const r = 30 + Math.sin(t + i) * 15;
          const gradient = causticCtx.createRadialGradient(x, y, 0, x, y, r);
          gradient.addColorStop(0, 'rgba(120, 200, 255, 0.4)');
          gradient.addColorStop(0.5, 'rgba(80, 170, 230, 0.15)');
          gradient.addColorStop(1, 'rgba(40, 120, 180, 0)');
          causticCtx.fillStyle = gradient;
          causticCtx.fillRect(0, 0, 256, 256);
        }
        causticTexture.needsUpdate = true;
      }

      /* ── Light rays from above ── */
      const rayGroup = new THREE.Group();
      scene.add(rayGroup);
      const rayMat = new THREE.MeshBasicMaterial({
        color: 0x4a99c0,
        transparent: true,
        opacity: 0.025,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        side: THREE.DoubleSide,
      });

      for (let i = 0; i < 5; i++) {
        const width = 2 + Math.random() * 4;
        const rayGeo = new THREE.PlaneGeometry(width, 80);
        const ray = new THREE.Mesh(rayGeo, rayMat.clone());
        ray.material.opacity = 0.015 + Math.random() * 0.02;
        ray.position.set(
          (Math.random() - 0.5) * 60,
          15,
          (Math.random() - 0.5) * 30 - 10
        );
        ray.rotation.z = (Math.random() - 0.5) * 0.15;
        ray.rotation.y = (Math.random() - 0.5) * 0.3;
        rayGroup.add(ray);
      }

      /* ── Floating particles (plankton / sediment) ── */
      const particleCount = 300;
      const particleGeo = new THREE.BufferGeometry();
      const particlePositions = new Float32Array(particleCount * 3);
      const particleSpeeds = [];
      for (let i = 0; i < particleCount; i++) {
        particlePositions[i * 3] = (Math.random() - 0.5) * 100;
        particlePositions[i * 3 + 1] = (Math.random() - 0.5) * 60;
        particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 80;
        particleSpeeds.push(0.002 + Math.random() * 0.008);
      }
      particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
      const particleMat = new THREE.PointsMaterial({
        color: 0x6aaccf,
        size: 0.15,
        transparent: true,
        opacity: 0.35,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
      });
      const particles = new THREE.Points(particleGeo, particleMat);
      scene.add(particles);

      function updateParticles() {
        const pos = particles.geometry.attributes.position.array;
        for (let i = 0; i < particleCount; i++) {
          pos[i * 3 + 1] += particleSpeeds[i]; /* drift upward */
          if (pos[i * 3 + 1] > 30) pos[i * 3 + 1] = -30;
        }
        particles.geometry.attributes.position.needsUpdate = true;
      }

      /* ── Fish geometry ── */
      function createFishGeometry() {
        const geo = new THREE.BufferGeometry();
        /*
         * Fish profile — elongated diamond body with a forked tail
         *
         *   Nose at z = -1.0
         *   Body widens to x = ±0.22, y = ±0.1 at z = -0.2
         *   Tapers to peduncle at z = 0.5
         *   Tail fork tips at z = 0.9, y = ±0.2
         */
        const v = [
          /* 0: nose */               0.0,   0.0,  -1.0,
          /* 1: top-left body */      -0.18,  0.09, -0.2,
          /* 2: top-right body */      0.18,  0.09, -0.2,
          /* 3: bottom-left body */   -0.18, -0.07, -0.2,
          /* 4: bottom-right body */   0.18, -0.07, -0.2,
          /* 5: top crest */           0.0,   0.12, -0.15,
          /* 6: belly */               0.0,  -0.09, -0.15,
          /* 7: left mid */           -0.15,  0.02,  0.15,
          /* 8: right mid */           0.15,  0.02,  0.15,
          /* 9: peduncle (tail base)*/ 0.0,   0.0,   0.5,
          /* 10: tail top */           0.0,   0.18,  0.85,
          /* 11: tail bottom */        0.0,  -0.16,  0.85,
          /* 12: tail center */        0.0,   0.0,   0.7,
        ];
        const vertices = new Float32Array(v);

        const idx = [
          /* Body — nose to midsection */
          0, 5, 2,
          0, 2, 4,
          0, 4, 6,
          0, 6, 3,
          0, 3, 1,
          0, 1, 5,
          /* Body sides */
          5, 2, 8,
          5, 8, 7,
          5, 7, 1,
          6, 4, 8,
          6, 8, 7,
          6, 7, 3,
          /* Midsection to peduncle */
          7, 8, 9,
          1, 7, 9,
          2, 8, 9,
          3, 7, 9,
          4, 8, 9,
          /* Tail fork */
          9, 12, 10,
          9, 10, 12,
          9, 12, 11,
          9, 11, 12,
        ];

        geo.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
        geo.setIndex(idx);
        geo.computeVertexNormals();
        return geo;
      }

      const fishGeo = createFishGeometry();

      /* ── Instanced mesh with subtle color variation ── */
      const fishMat = new THREE.MeshPhongMaterial({
        color: 0x5588aa,
        emissive: 0x0a1a2a,
        specular: 0x88bbdd,
        shininess: 60,
        transparent: true,
        opacity: 0.88,
        side: THREE.DoubleSide,
      });
      const school = new THREE.InstancedMesh(fishGeo, fishMat, FISH_COUNT);
      scene.add(school);

      /* Per-instance silver/blue color variation */
      const baseColors = [
        new THREE.Color(0x6699bb),
        new THREE.Color(0x5588aa),
        new THREE.Color(0x7aaac5),
        new THREE.Color(0x4a7a99),
        new THREE.Color(0x8ab5cc),
      ];
      for (let i = 0; i < FISH_COUNT; i++) {
        school.setColorAt(i, baseColors[Math.floor(Math.random() * baseColors.length)]);
      }
      school.instanceColor.needsUpdate = true;

      /* ── Lighting ── */
      const ambientLight = new THREE.AmbientLight(0x1a3050, 0.6);
      scene.add(ambientLight);

      const dirLight = new THREE.DirectionalLight(0x6ab0d4, 0.8);
      dirLight.position.set(5, 30, 10);
      scene.add(dirLight);

      const rimLight = new THREE.DirectionalLight(0x2a5575, 0.3);
      rimLight.position.set(-10, -5, -15);
      scene.add(rimLight);

      /* ── Boid state ── */
      const positions = [];
      const velocities = [];
      const dummy = new THREE.Object3D();
      const tempVec = new THREE.Vector3();
      const forwardVec = new THREE.Vector3();

      for (let i = 0; i < FISH_COUNT; i++) {
        positions.push(new THREE.Vector3(
          (Math.random() - 0.5) * BOUNDS * 0.7,
          (Math.random() - 0.5) * BOUNDS * 0.35,
          (Math.random() - 0.5) * BOUNDS * 0.7
        ));
        const v = new THREE.Vector3(
          (Math.random() - 0.5),
          (Math.random() - 0.5) * 0.2,
          (Math.random() - 0.5)
        );
        v.normalize().multiplyScalar(MIN_SPEED + Math.random() * (MAX_SPEED - MIN_SPEED));
        velocities.push(v);
      }

      /* ── Spatial grid ── */
      const CELL_SIZE = Math.max(SEPARATION_DIST, ALIGNMENT_DIST, COHESION_DIST);
      const grid = new Map();

      function cellKey(x, y, z) {
        return `${Math.floor(x / CELL_SIZE)},${Math.floor(y / CELL_SIZE)},${Math.floor(z / CELL_SIZE)}`;
      }

      function buildGrid() {
        grid.clear();
        for (let i = 0; i < FISH_COUNT; i++) {
          const key = cellKey(positions[i].x, positions[i].y, positions[i].z);
          if (!grid.has(key)) grid.set(key, []);
          grid.get(key).push(i);
        }
      }

      function getNeighborCells(pos) {
        const cx = Math.floor(pos.x / CELL_SIZE);
        const cy = Math.floor(pos.y / CELL_SIZE);
        const cz = Math.floor(pos.z / CELL_SIZE);
        const neighbors = [];
        for (let dx = -1; dx <= 1; dx++) {
          for (let dy = -1; dy <= 1; dy++) {
            for (let dz = -1; dz <= 1; dz++) {
              const key = `${cx + dx},${cy + dy},${cz + dz}`;
              const cell = grid.get(key);
              if (cell) neighbors.push(cell);
            }
          }
        }
        return neighbors;
      }

      /* ── Fish schooling update ── */
      const separation = new THREE.Vector3();
      const alignment = new THREE.Vector3();
      const cohesion = new THREE.Vector3();
      const steer = new THREE.Vector3();
      const toNeighbor = new THREE.Vector3();

      function updateSchool() {
        buildGrid();

        for (let i = 0; i < FISH_COUNT; i++) {
          const pos = positions[i];
          const vel = velocities[i];
          const currentSpeed = vel.length();

          /* Fish's forward direction for visual field check */
          forwardVec.copy(vel).normalize();

          separation.set(0, 0, 0);
          alignment.set(0, 0, 0);
          cohesion.set(0, 0, 0);
          let sepCount = 0, aliCount = 0, cohCount = 0;
          let nearestDist = Infinity;
          let neighborAvgSpeed = 0;
          let speedNeighborCount = 0;

          const cells = getNeighborCells(pos);
          for (let c = 0; c < cells.length; c++) {
            const cell = cells[c];
            for (let k = 0; k < cell.length; k++) {
              const j = cell[k];
              if (j === i) continue;

              toNeighbor.subVectors(positions[j], pos);
              const dist = toNeighbor.length();
              if (dist === 0) continue;

              /* Visual field check: ~310° field of view */
              const dotProduct = forwardVec.dot(toNeighbor.normalize());
              if (dotProduct < BLIND_SPOT_COS) continue; /* in blind spot */

              if (dist < nearestDist) nearestDist = dist;

              if (dist < SEPARATION_DIST) {
                /* Inverse-square repulsion — stronger the closer they get */
                const strength = (SEPARATION_DIST - dist) / SEPARATION_DIST;
                tempVec.subVectors(pos, positions[j]).normalize().multiplyScalar(strength * strength);
                separation.add(tempVec);
                sepCount++;
              }
              if (dist < ALIGNMENT_DIST) {
                alignment.add(velocities[j]);
                aliCount++;
              }
              if (dist < COHESION_DIST) {
                cohesion.add(positions[j]);
                cohCount++;
                neighborAvgSpeed += velocities[j].length();
                speedNeighborCount++;
              }
            }
          }

          steer.set(0, 0, 0);

          if (sepCount > 0) {
            separation.divideScalar(sepCount).normalize().multiplyScalar(SEPARATION_FORCE);
            steer.add(separation);
          }
          if (aliCount > 0) {
            alignment.divideScalar(aliCount).normalize().multiplyScalar(ALIGNMENT_FORCE);
            steer.add(alignment);
          }
          if (cohCount > 0) {
            cohesion.divideScalar(cohCount).sub(pos).normalize().multiplyScalar(COHESION_FORCE);
            steer.add(cohesion);
          }

          /*
           * Speed regulation — primary interaction mechanism in fish.
           * Fish slow down to avoid collisions, speed up to rejoin school.
           * This propagates information through the school via speed changes.
           */
          if (speedNeighborCount > 0) {
            neighborAvgSpeed /= speedNeighborCount;
            const speedDiff = neighborAvgSpeed - currentSpeed;
            const speedAdjust = forwardVec.clone().multiplyScalar(speedDiff * SPEED_REGULATION);
            steer.add(speedAdjust);
          }

          /* Gentle wander — minimal Y for ladder-formation tendency */
          steer.x += (Math.random() - 0.5) * WANDER_FORCE;
          steer.y += (Math.random() - 0.5) * WANDER_FORCE * 0.2;
          steer.z += (Math.random() - 0.5) * WANDER_FORCE;

          /* Depth centering — fish stay in a band but allow vertical stagger */
          steer.y -= pos.y * 0.001;

          /* Cruise speed attraction — drift toward cruise speed when alone */
          if (speedNeighborCount === 0) {
            const cruiseDiff = CRUISE_SPEED - currentSpeed;
            steer.add(forwardVec.clone().multiplyScalar(cruiseDiff * 0.01));
          }

          /* Soft boundaries */
          const halfBounds = BOUNDS * 0.5;
          const vHalf = halfBounds * 0.45; /* vertical bounds allow ladder stagger */
          if (pos.x > halfBounds) steer.x -= BOUNDARY_FORCE * ((pos.x - halfBounds) / halfBounds);
          if (pos.x < -halfBounds) steer.x += BOUNDARY_FORCE * ((-halfBounds - pos.x) / halfBounds);
          if (pos.y > vHalf) steer.y -= BOUNDARY_FORCE * 1.5 * ((pos.y - vHalf) / vHalf);
          if (pos.y < -vHalf) steer.y += BOUNDARY_FORCE * 1.5 * ((-vHalf - pos.y) / vHalf);
          if (pos.z > halfBounds) steer.z -= BOUNDARY_FORCE * ((pos.z - halfBounds) / halfBounds);
          if (pos.z < -halfBounds) steer.z += BOUNDARY_FORCE * ((-halfBounds - pos.z) / halfBounds);

          vel.add(steer);

          /* Dampen vertical velocity — semi-planar schooling with ladder stagger */
          vel.y *= 0.96;

          const speed = vel.length();
          if (speed > MAX_SPEED) vel.multiplyScalar(MAX_SPEED / speed);
          if (speed < MIN_SPEED && speed > 0) vel.multiplyScalar(MIN_SPEED / speed);

          pos.add(vel);

          /* Update instance matrix — fish points along velocity */
          dummy.position.copy(pos);
          tempVec.addVectors(pos, vel);
          dummy.lookAt(tempVec);
          dummy.updateMatrix();
          school.setMatrixAt(i, dummy.matrix);
        }

        school.instanceMatrix.needsUpdate = true;
      }

      /* ── Camera ── */
      let camAngle = 0;
      const camRadius = 50;

      function updateCamera(time) {
        camAngle += 0.0004;
        const wobbleY = Math.sin(time * 0.00012) * 3;
        const wobbleR = Math.sin(time * 0.00008) * 6;
        camera.position.x = Math.cos(camAngle) * (camRadius + wobbleR);
        camera.position.z = Math.sin(camAngle) * (camRadius + wobbleR);
        camera.position.y = wobbleY;
        camera.lookAt(0, 0, 0);
      }

      /* ── Animate light rays ── */
      function updateRays(time) {
        const children = rayGroup.children;
        for (let i = 0; i < children.length; i++) {
          children[i].material.opacity = 0.015 + Math.sin(time * 0.0002 + i * 1.5) * 0.01;
        }
      }

      /* ── Main loop ── */
      function animate(time) {
        requestAnimationFrame(animate);
        updateSchool();
        updateCamera(time);
        updateCaustics(time);
        updateParticles();
        updateRays(time);
        renderer.render(scene, camera);
      }

      animate(0);

      /* ── Resize ── */
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    })();
  </script>
</body>
</html>
